<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chat Inteligente — Roles IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARIABLES ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

:root{
  --bg:#0d0f14;
  --bg2:#13161d;
  --bg3:#1a1e28;
  --bg4:#222736;
  --border:#2a2f3d;
  --border2:#353b4f;
  --text:#e8eaf0;
  --text2:#8b90a0;
  --text3:#555b6e;

  /* Colores por rol */
  --c-profesor:#4f9eff;
  --c-programador:#a78bfa;
  --c-psicologo:#34d399;
  --c-negocios:#fbbf24;
  --c-agente:#f87171;
  --c-default:#4f9eff;

  --radius:14px;
  --radius-sm:8px;
  --radius-xs:6px;
  --font:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
  --transition:180ms cubic-bezier(.4,0,.2,1);
}

body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100dvh;
  -webkit-font-smoothing:antialiased;
}

/* ── APP SHELL ─────────────────────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100dvh;max-width:860px;margin:0 auto;width:100%}

/* ── HEADER ────────────────────────────────────────────────────────── */
header{
  display:flex;align-items:center;gap:12px;
  padding:16px 20px 14px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
}
.logo{
  font-size:13px;font-weight:600;letter-spacing:.05em;
  color:var(--text2);text-transform:uppercase;
}
.logo span{color:var(--accent,var(--c-profesor));font-weight:700}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.model-badge{
  font-family:var(--mono);font-size:11px;
  color:var(--text3);
  border:1px solid var(--border);
  padding:3px 10px;border-radius:20px;
  cursor:pointer;transition:var(--transition);
}
.model-badge:hover{border-color:var(--border2);color:var(--text2)}
.btn-icon{
  width:32px;height:32px;border-radius:var(--radius-xs);
  background:transparent;border:1px solid var(--border);
  color:var(--text2);cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:var(--transition);font-size:15px;
}
.btn-icon:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}

/* ── ROL SELECTOR ──────────────────────────────────────────────────── */
.roles-strip{
  display:flex;gap:8px;padding:14px 20px;
  border-bottom:1px solid var(--border);
  overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;
}
.roles-strip::-webkit-scrollbar{display:none}

.rol-btn{
  display:flex;align-items:center;gap:7px;
  padding:8px 14px;border-radius:20px;
  border:1px solid var(--border);
  background:var(--bg2);
  font:500 13px var(--font);color:var(--text2);
  cursor:pointer;white-space:nowrap;
  transition:var(--transition);flex-shrink:0;
}
.rol-btn:hover{border-color:var(--border2);color:var(--text)}
.rol-btn.active{
  border-color:var(--rc);
  background:color-mix(in srgb,var(--rc) 12%,transparent);
  color:var(--rc);
  box-shadow:0 0 0 1px color-mix(in srgb,var(--rc) 30%,transparent) inset;
}
.rol-btn .rol-icon{font-size:15px}

/* ── CHAT AREA ─────────────────────────────────────────────────────── */
.chat-area{
  flex:1;overflow-y:auto;
  padding:24px 20px;
  display:flex;flex-direction:column;gap:20px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* Estado vacío */
.empty-state{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;text-align:center;padding:40px 20px;
}
.empty-icon{
  font-size:48px;
  filter:grayscale(.5);
  animation:float 3s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.empty-title{font-size:20px;font-weight:600;color:var(--text)}
.empty-sub{font-size:14px;color:var(--text2);line-height:1.6;max-width:340px}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.suggestion-btn{
  padding:8px 14px;border-radius:20px;
  border:1px solid var(--border);background:var(--bg2);
  font:400 13px var(--font);color:var(--text2);
  cursor:pointer;transition:var(--transition);
}
.suggestion-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}

/* Burbujas */
.msg{display:flex;gap:12px;animation:msgIn .25s ease-out both}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.msg.user{flex-direction:row-reverse}
.msg-avatar{
  width:32px;height:32px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
  background:var(--bg3);border:1px solid var(--border);
}
.msg.user .msg-avatar{
  background:color-mix(in srgb,var(--accent,var(--c-profesor)) 15%,transparent);
  border-color:color-mix(in srgb,var(--accent,var(--c-profesor)) 30%,transparent);
}

.msg-bubble{
  max-width:72%;
  padding:13px 16px;
  border-radius:var(--radius);
  font-size:14px;line-height:1.65;
  word-break:break-word;
}
.msg.user .msg-bubble{
  background:color-mix(in srgb,var(--accent,var(--c-profesor)) 14%,transparent);
  border:1px solid color-mix(in srgb,var(--accent,var(--c-profesor)) 25%,transparent);
  border-bottom-right-radius:4px;
  color:var(--text);
}
.msg.ai .msg-bubble{
  background:var(--bg2);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
  color:var(--text);
}

/* Markdown rendering */
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3{
  font-weight:600;margin:.7em 0 .3em;color:var(--text);
}
.msg-bubble h1{font-size:16px}
.msg-bubble h2{font-size:15px}
.msg-bubble h3{font-size:14px}
.msg-bubble p{margin:.4em 0}
.msg-bubble ul,.msg-bubble ol{margin:.4em 0;padding-left:1.4em}
.msg-bubble li{margin:.2em 0}
.msg-bubble code{
  font-family:var(--mono);font-size:12px;
  background:var(--bg4);padding:2px 6px;border-radius:4px;
  color:#a5b4fc;border:1px solid var(--border);
}
.msg-bubble pre{
  background:var(--bg4);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;margin:.6em 0;
  overflow-x:auto;
}
.msg-bubble pre code{
  background:transparent;border:none;padding:0;font-size:12px;
  color:#c4b5fd;
}
.msg-bubble strong{color:var(--text);font-weight:600}
.msg-bubble blockquote{
  border-left:3px solid var(--accent,var(--c-profesor));
  padding-left:12px;margin:.5em 0;color:var(--text2);
}

/* Typing indicator */
.typing-dots{display:flex;gap:5px;padding:4px 0;align-items:center}
.typing-dots span{
  width:7px;height:7px;border-radius:50%;
  background:var(--text3);animation:dot .9s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:.3;transform:scale(.9)}40%{opacity:1;transform:scale(1)}}

/* ── INPUT AREA ────────────────────────────────────────────────────── */
.input-area{
  padding:16px 20px 20px;
  border-top:1px solid var(--border);
  background:var(--bg);flex-shrink:0;
}
.input-row{
  display:flex;align-items:flex-end;gap:10px;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:10px 12px;
  transition:var(--transition);
}
.input-row:focus-within{
  border-color:var(--accent,var(--c-profesor));
  box-shadow:0 0 0 3px color-mix(in srgb,var(--accent,var(--c-profesor)) 12%,transparent);
}
#user-input{
  flex:1;background:transparent;border:none;outline:none;
  font:400 14px var(--font);color:var(--text);
  resize:none;max-height:160px;min-height:24px;line-height:1.5;
}
#user-input::placeholder{color:var(--text3)}
.send-btn{
  width:36px;height:36px;border-radius:var(--radius-sm);
  background:var(--accent,var(--c-profesor));
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:#fff;font-size:16px;
  transition:var(--transition);
}
.send-btn:hover{filter:brightness(1.1);transform:scale(1.04)}
.send-btn:active{transform:scale(.97)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.input-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:9px;padding:0 2px;
}
.input-hint{font-size:11px;color:var(--text3)}
.char-count{font-size:11px;color:var(--text3);font-family:var(--mono)}

/* ── MODAL ─────────────────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  z-index:100;padding:20px;
  animation:fadeIn .15s ease;
}
.modal-overlay.hidden{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--radius);padding:24px;
  max-width:400px;width:100%;
  animation:slideUp .2s ease;
}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-input{
  width:100%;background:var(--bg3);
  border:1px solid var(--border2);border-radius:var(--radius-sm);
  font:400 14px var(--mono);color:var(--text);
  padding:10px 12px;outline:none;
  transition:var(--transition);
}
.modal-input:focus{border-color:var(--c-profesor)}
.modal-row{display:flex;gap:10px;margin-top:16px}
.modal-btn{
  flex:1;padding:10px;border-radius:var(--radius-sm);
  border:1px solid var(--border2);background:var(--bg3);
  font:500 13px var(--font);color:var(--text2);cursor:pointer;
  transition:var(--transition);
}
.modal-btn:hover{background:var(--bg4);color:var(--text)}
.modal-btn.primary{
  background:var(--c-profesor);border-color:var(--c-profesor);
  color:#fff;
}
.modal-btn.primary:hover{filter:brightness(1.1)}

/* ── TOAST ─────────────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);font-size:13px;padding:10px 18px;
  border-radius:20px;z-index:200;
  animation:toastIn .2s ease;pointer-events:none;
  white-space:nowrap;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── RESPONSIVE ────────────────────────────────────────────────────── */
@media(max-width:600px){
  .msg-bubble{max-width:88%}
  header{padding:12px 16px}
  .roles-strip{padding:12px 16px}
  .chat-area{padding:16px}
  .input-area{padding:12px 16px 16px}
}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- ── HEADER ───────────────────────────────────────────────────── -->
  <header>
    <div class="logo">Chat <span>IA</span> — Roles</div>
    <div class="header-right">
      <div class="model-badge" id="model-badge" onclick="abrirModeloModal()" title="Cambiar modelo">llama3</div>
      <button class="btn-icon" onclick="limpiarChat()" title="Nueva conversación">↺</button>
    </div>
  </header>

  <!-- ── SELECTOR DE ROLES ─────────────────────────────────────────── -->
  <div class="roles-strip" id="roles-strip">
    <!-- Generado por JS -->
  </div>

  <!-- ── ÁREA DE CHAT ─────────────────────────────────────────────── -->
  <div class="chat-area" id="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon" id="empty-icon">📚</div>
      <div class="empty-title">¿En qué te ayudo hoy?</div>
      <div class="empty-sub" id="empty-sub">Selecciona un rol y escribe tu pregunta. La IA adaptará su estilo y enfoque.</div>
      <div class="suggestions" id="suggestions"></div>
    </div>
  </div>

  <!-- ── INPUT ────────────────────────────────────────────────────── -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="user-input" placeholder="Escribe tu pregunta aquí..." rows="1"
        oninput="autoResize(this);actualizarContador()"
        onkeydown="manejarTecla(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="enviarMensaje()">➤</button>
    </div>
    <div class="input-footer">
      <span class="input-hint">Enter para enviar · Shift+Enter para nueva línea</span>
      <span class="char-count" id="char-count">0 / 4000</span>
    </div>
  </div>
</div>

<!-- ── MODAL MODELO ──────────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="modelo-modal">
  <div class="modal">
    <h3>🤖 Modelo de Ollama</h3>
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px">
      Escribe el nombre del modelo instalado en Ollama.<br>
      <span style="font-family:var(--mono);font-size:12px">ollama list</span> para ver los disponibles.
    </p>
    <input class="modal-input" id="modelo-input" placeholder="llama3, mistral, gemma2..." value="llama3">
    <div class="modal-row">
      <button class="modal-btn" onclick="cerrarModal()">Cancelar</button>
      <button class="modal-btn primary" onclick="guardarModelo()">Guardar</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════
   ESTADO GLOBAL
════════════════════════════════════════════════════════════════ */
const API = 'http://localhost:8000/api';

const ROLES = [
  { id:'profesor',      icono:'📚', nombre:'Profesor',
    color:'var(--c-profesor)', hint:'Aprende cualquier tema',
    sugerencias:['¿Cómo funciona la fotosíntesis?','Explícame la recursividad','¿Qué es la inflación?']},
  { id:'programador',   icono:'💻', nombre:'Dev',
    color:'var(--c-programador)', hint:'Código y soluciones técnicas',
    sugerencias:['Crea una API REST en Python','¿Cómo uso async/await?','Explica los índices en SQL']},
  { id:'psicologo',     icono:'🧠', nombre:'Psicólogo',
    color:'var(--c-psicologo)', hint:'Apoyo emocional y bienestar',
    sugerencias:['Me siento muy estresado','¿Cómo manejo la ansiedad?','Necesito motivación']},
  { id:'negocios',      icono:'📊', nombre:'Negocios',
    color:'var(--c-negocios)', hint:'Estrategia y consultoría',
    sugerencias:['Analiza mi modelo de negocio','¿Cómo consigo mis primeros clientes?','FODA para mi startup']},
  { id:'agente_empresa',icono:'🏢', nombre:'Agente',
    color:'var(--c-agente)', hint:'Atención al cliente con contexto',
    sugerencias:['¿Cuál es su horario?','¿Qué productos tienen?','¿Cómo hago un pedido?']},
];

let estado = {
  rolActual: 'profesor',
  modelo: 'llama3',
  sesionId: null,
  enviando: false,
};

/* ════════════════════════════════════════════════════════════════
   INICIALIZACIÓN
════════════════════════════════════════════════════════════════ */
function init() {
  renderRoles();
  seleccionarRol('profesor');
  verificarAPI();
}

function renderRoles() {
  const strip = document.getElementById('roles-strip');
  strip.innerHTML = ROLES.map(r => `
    <button class="rol-btn" id="btn-${r.id}"
      style="--rc:${r.color}"
      onclick="seleccionarRol('${r.id}')"
      title="${r.hint}">
      <span class="rol-icon">${r.icono}</span>
      ${r.nombre}
    </button>
  `).join('');
}

function seleccionarRol(rolId) {
  const rol = ROLES.find(r => r.id === rolId);
  if (!rol) return;

  estado.rolActual = rolId;
  estado.sesionId = null; // Nueva sesión al cambiar rol

  // UI: actualizar botones
  document.querySelectorAll('.rol-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${rolId}`).classList.add('active');

  // Actualizar color de acento
  document.documentElement.style.setProperty('--accent', rol.color);
  document.getElementById('app').style.setProperty('--accent', rol.color);

  // Actualizar estado vacío
  document.getElementById('empty-icon').textContent = rol.icono;
  document.getElementById('empty-sub').textContent = `Rol: ${rol.nombre} — ${rol.hint}`;
  renderSugerencias(rol);
}

function renderSugerencias(rol) {
  const container = document.getElementById('suggestions');
  container.innerHTML = rol.sugerencias.map(s => `
    <button class="suggestion-btn" onclick="usarSugerencia('${s.replace(/'/g,"\\'")}')">
      ${s}
    </button>
  `).join('');
}

function usarSugerencia(texto) {
  const input = document.getElementById('user-input');
  input.value = texto;
  autoResize(input);
  actualizarContador();
  enviarMensaje();
}

/* ════════════════════════════════════════════════════════════════
   ENVÍO DE MENSAJES
════════════════════════════════════════════════════════════════ */
async function enviarMensaje() {
  const input = document.getElementById('user-input');
  const pregunta = input.value.trim();
  if (!pregunta || estado.enviando) return;

  // Ocultar estado vacío
  document.getElementById('empty-state').style.display = 'none';

  // Agregar burbuja del usuario
  agregarMensaje('user', pregunta);
  input.value = '';
  autoResize(input);
  actualizarContador();

  // Mostrar typing indicator
  const typingId = mostrarTyping();
  estado.enviando = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const resp = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        pregunta,
        rol_id: estado.rolActual,
        modelo: estado.modelo,
        sesion_id: estado.sesionId,
      }),
    });

    const datos = await resp.json();

    if (!resp.ok) throw new Error(datos.detail || 'Error del servidor');

    estado.sesionId = datos.sesion_id;
    quitarTyping(typingId);
    agregarMensaje('ai', datos.respuesta);

  } catch (err) {
    quitarTyping(typingId);
    agregarMensaje('ai', `❌ **Error:** ${err.message}\n\n¿Está corriendo Ollama? Ejecuta:\n\`\`\`\nollama serve\n\`\`\``);
  } finally {
    estado.enviando = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

/* ════════════════════════════════════════════════════════════════
   RENDERIZADO DE MENSAJES
════════════════════════════════════════════════════════════════ */
const rol = () => ROLES.find(r => r.id === estado.rolActual) || ROLES[0];

function agregarMensaje(tipo, contenido) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `msg ${tipo}`;

  const avatar = tipo === 'user'
    ? '<div class="msg-avatar">👤</div>'
    : `<div class="msg-avatar">${rol().icono}</div>`;

  div.innerHTML = `
    ${avatar}
    <div class="msg-bubble">${tipo === 'ai' ? renderMarkdown(contenido) : escHtml(contenido)}</div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function mostrarTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  const id = 'typing-' + Date.now();
  div.id = id;
  div.className = 'msg ai';
  div.innerHTML = `
    <div class="msg-avatar">${rol().icono}</div>
    <div class="msg-bubble">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return id;
}

function quitarTyping(id) {
  document.getElementById(id)?.remove();
}

/* ════════════════════════════════════════════════════════════════
   MARKDOWN RENDERER (ligero, sin librerías)
════════════════════════════════════════════════════════════════ */
function renderMarkdown(texto) {
  let html = escHtml(texto);

  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`);

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Blockquote
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Lists
  html = html.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
  html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>(\n|$))+/g, s => `<ul>${s}</ul>`);

  // Line breaks
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');

  return `<p>${html}</p>`;
}

function escHtml(str) {
  return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ════════════════════════════════════════════════════════════════
   UTILIDADES UI
════════════════════════════════════════════════════════════════ */
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function actualizarContador() {
  const val = document.getElementById('user-input').value.length;
  document.getElementById('char-count').textContent = `${val} / 4000`;
}

function manejarTecla(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    enviarMensaje();
  }
}

function limpiarChat() {
  // Limpiar sesión en API
  if (estado.sesionId) {
    fetch(`${API}/chat/${estado.sesionId}`, {method:'DELETE'}).catch(()=>{});
  }
  estado.sesionId = null;

  // Restaurar UI
  const area = document.getElementById('chat-area');
  area.innerHTML = '';
  const empty = document.createElement('div');
  empty.id = 'empty-state';
  empty.className = 'empty-state';
  const r = rol();
  empty.innerHTML = `
    <div class="empty-icon" id="empty-icon">${r.icono}</div>
    <div class="empty-title">¿En qué te ayudo hoy?</div>
    <div class="empty-sub" id="empty-sub">Rol: ${r.nombre} — ${r.hint}</div>
    <div class="suggestions" id="suggestions"></div>
  `;
  area.appendChild(empty);
  renderSugerencias(r);
  mostrarToast('💬 Nueva conversación iniciada');
}

/* ── Modal modelo ──────────────────────────────────────────────── */
function abrirModeloModal() {
  document.getElementById('modelo-input').value = estado.modelo;
  document.getElementById('modelo-modal').classList.remove('hidden');
}
function cerrarModal() {
  document.getElementById('modelo-modal').classList.add('hidden');
}
function guardarModelo() {
  const val = document.getElementById('modelo-input').value.trim();
  if (val) {
    estado.modelo = val;
    document.getElementById('model-badge').textContent = val;
    mostrarToast(`🤖 Modelo: ${val}`);
  }
  cerrarModal();
}

/* ── Toast ─────────────────────────────────────────────────────── */
function mostrarToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

/* ── Verificar API ─────────────────────────────────────────────── */
async function verificarAPI() {
  try {
    const resp = await fetch(`${API}/health`);
    const datos = await resp.json();
    if (!datos.ollama?.activo) {
      mostrarToast('⚠️ Ollama no detectado — ejecuta: ollama serve');
    } else if (datos.ollama.modelos?.length > 0) {
      // Sugerir primer modelo disponible
      const primerModelo = datos.ollama.modelos[0].replace(':latest','');
      if (primerModelo && primerModelo !== estado.modelo) {
        estado.modelo = primerModelo;
        document.getElementById('model-badge').textContent = primerModelo;
      }
    }
  } catch {
    // API no disponible — modo demo
  }
}

/* Cerrar modal al hacer clic fuera */
document.getElementById('modelo-modal').addEventListener('click', function(e){
  if (e.target === this) cerrarModal();
});

/* ── START ─────────────────────────────────────────────────────── */
init();
</script>
